<?xml version="1.0" encoding="UTF-8"?>
<svg width="360" height="100" viewBox="0 0 360 100"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="EcoTrueque Venezuela">

  <defs>
    <!-- Gradiente del ícono: verde brillante → verde oscuro -->
    <linearGradient id="iconGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2EC786"/>
      <stop offset="100%" stop-color="#0A5C43"/>
    </linearGradient>

    <!-- Sombra suave del ícono -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0A5C43" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ÍCONO MARCA (80×80 centrado verticalmente) -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(0, 10)" filter="url(#shadow)">

    <!-- Fondo cuadrado redondeado -->
    <rect x="0" y="0" width="80" height="80" rx="18" ry="18" fill="url(#iconGrad)"/>

    <!-- Hoja blanca: punta arriba, simétrica -->
    <path d="M40 10
             C53 19 58 34 52 47
             C48 56 40 60 40 60
             C40 60 32 56 28 47
             C22 34 27 19 40 10 Z"
          fill="white"/>

    <!-- Nervio central de la hoja (textura natural) -->
    <line x1="40" y1="14" x2="40" y2="57"
          stroke="#0E6A47" stroke-width="1.4"
          stroke-linecap="round" stroke-dasharray="2.5,2"/>

    <!-- Flecha derecha → (intercambio, zona superior) -->
    <g stroke="#0D5C3E" stroke-width="2.3"
       stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="26" y1="33" x2="48" y2="33"/>
      <polyline points="43,29 48,33 43,37"/>
    </g>

    <!-- Flecha izquierda ← (intercambio, zona inferior) -->
    <g stroke="#0D5C3E" stroke-width="2.3"
       stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="51" y1="45" x2="29" y2="45"/>
      <polyline points="34,41 29,45 34,49"/>
    </g>

  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TEXTO                                       -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- "eco" — peso fino, verde primario -->
  <text x="96" y="60"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38" font-weight="300"
        fill="#1D9E75"
        dominant-baseline="auto">eco</text>

  <!-- "trueque" — peso negro/extrabold, verde oscuro -->
  <text x="163" y="60"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38" font-weight="800"
        fill="#0A5C43"
        dominant-baseline="auto">trueque</text>

  <!-- Línea decorativa bajo el nombre -->
  <line x1="96" y1="67" x2="338" y2="67"
        stroke="#1D9E75" stroke-width="0.6" opacity="0.35"/>

  <!-- "VENEZUELA" — tagline, pequeña, espaciada -->
  <text x="96" y="82"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="500"
        fill="#6B9E8A" letter-spacing="5.5"
        dominant-baseline="auto">VENEZUELA</text>

</svg>
